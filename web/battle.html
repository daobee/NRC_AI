<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洛克王国 · 战斗模拟器</title>
<style>
/* ═══════════════════════════════════════
   CSS 变量 & Reset
═══════════════════════════════════════ */
:root {
  --bg-dark:    #0a0e1a;
  --bg-field:   #111827;
  --bg-panel:   #0f1623;
  --bg-card:    #1a2235;
  --bg-card-h:  #233049;
  --border:     #2a3a55;
  --accent:     #4fc3f7;
  --accentg:    rgba(79,195,247,.3);
  --green:      #4ade80;
  --yellow:     #fbbf24;
  --red:        #f87171;
  --purple:     #c084fc;
  --orange:     #fb923c;
  --pink:       #f472b6;
  --text:       #e2e8f0;
  --dim:        #94a3b8;
  --muted:      #475569;
  --hp-g:       #4ade80;
  --hp-y:       #fbbf24;
  --hp-r:       #f87171;
  --r:          12px;
  --rs:         8px;
  --field-h:    320px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg-dark);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ═══ 顶栏 ═══ */
#top-bar{background:linear-gradient(90deg,#0a1628,#111e3a);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;height:46px;box-shadow:0 2px 12px rgba(0,0,0,.4)}
#top-bar h1{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:.5px}
#turn-info{font-size:12px;color:var(--dim);background:rgba(79,195,247,.08);padding:3px 10px;border-radius:20px;border:1px solid rgba(79,195,247,.2)}
#conn-status{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--bg-card);border:1px solid var(--border)}
#conn-status.connected{color:var(--green);border-color:rgba(74,222,128,.4)}
#conn-status.disconnected{color:var(--red);border-color:rgba(248,113,113,.3)}

/* ═══ 主体 ═══ */
#main{display:grid;grid-template-columns:1fr 300px;flex:1;overflow:hidden}

/* ═══ 战场 ═══ */
#battlefield{display:flex;flex-direction:column;overflow:hidden}

/* ── arena ── */
#arena{
  position:relative;height:var(--field-h);flex-shrink:0;overflow:hidden;
  background:linear-gradient(180deg,#87CEEB 0%,#B0DCF0 30%,#C8E6C9 55%,#7CB342 68%,#558B2F 85%,#33691E 100%);
}
/* 云朵 */
#arena::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 35% 12% at 15% 18%,rgba(255,255,255,.55) 0%,transparent 70%),
    radial-gradient(ellipse 25% 10% at 60% 12%,rgba(255,255,255,.45) 0%,transparent 70%),
    radial-gradient(ellipse 18% 8% at 82% 22%,rgba(255,255,255,.35) 0%,transparent 70%),
    radial-gradient(ellipse 22% 9% at 40% 25%,rgba(255,255,255,.3) 0%,transparent 70%);
  pointer-events:none
}
/* 草地 */
#arena::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:38%;
  background:linear-gradient(180deg,#7CB342 0%,#689F38 40%,#558B2F 100%);
  pointer-events:none
}
/* 椭圆平台 */
.platform{
  position:absolute;bottom:30%;width:180px;height:28px;border-radius:50%;
  pointer-events:none;z-index:1
}
#plat-a{left:18%;transform:translateX(-50%);background:radial-gradient(ellipse,rgba(76,175,80,.5) 0%,rgba(56,142,60,.3) 50%,transparent 70%);box-shadow:0 2px 12px rgba(0,0,0,.2)}
#plat-b{right:18%;transform:translateX(50%);background:radial-gradient(ellipse,rgba(76,175,80,.5) 0%,rgba(56,142,60,.3) 50%,transparent 70%);box-shadow:0 2px 12px rgba(0,0,0,.2)}
/* 分隔线 */
.field-line{
  position:absolute;bottom:38%;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(100,200,120,.25),transparent);
  pointer-events:none
}

/* ── HP 面板（Showdown 风格白底） ── */
.hp-panel{
  position:absolute;top:10px;width:224px;
  background:rgba(255,255,255,.88);
  border:1px solid #aaa;
  border-radius:8px;
  padding:6px 10px;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
  color:#222;z-index:2
}
#hpbar-a{left:10px}
#hpbar-b{right:10px}
.hpbar-top{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.hpbar-name{font-size:12px;font-weight:700;color:#222;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.type-badge{font-size:9px;padding:1px 6px;border-radius:5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0;color:#fff}
/* 能量圆点 */
.energy-row{display:flex;gap:3px;margin-bottom:4px;align-items:center}
.energy-label{font-size:8px;color:#777;margin-right:4px}
#energy-a,#energy-b{display:flex;gap:3px}
.e-dot{width:7px;height:7px;border-radius:50%;background:#ccc;border:1px solid #aaa;transition:background .2s,box-shadow .2s}
.e-dot.on{background:#4FC3F7;border-color:#0288D1;box-shadow:0 0 4px rgba(79,195,247,.6)}
/* HP 条 */
.hp-track{height:8px;background:#ddd;border:1px solid #999;border-radius:4px;overflow:hidden;margin-bottom:2px;position:relative}
.hp-fill{height:100%;border-radius:3px;transition:width .45s ease,background .45s;background:linear-gradient(180deg,#00dd60 0%,#00bb51 50%,#007734 100%)}
.hp-fill.hp-yellow{background:linear-gradient(180deg,#f8e379 0%,#f5d538 50%,#be9f0a 100%)}
.hp-fill.hp-red{background:linear-gradient(180deg,#f37f67 0%,#ee4928 50%,#a3260d 100%)}
.hp-text{font-size:9px;color:#666;display:flex;justify-content:space-between}
/* 状态行 */
.buff-row{display:flex;flex-wrap:wrap;gap:2px;margin-top:4px;min-height:14px}
.buff-tag{font-size:8px;padding:1px 5px;border-radius:6px;font-weight:600;line-height:1.5}
.buff-up{background:rgba(74,222,128,.18);color:#4ade80;border:1px solid rgba(74,222,128,.3)}
.buff-down{background:rgba(248,113,113,.18);color:#f87171;border:1px solid rgba(248,113,113,.3)}
.buff-ability{background:rgba(192,132,252,.18);color:#c084fc;border:1px solid rgba(192,132,252,.3)}
.buff-status{background:rgba(251,191,36,.18);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.buff-cute{background:rgba(244,114,182,.18);color:#f472b6;border:1px solid rgba(244,114,182,.3)}

/* MP 点 */
.mp-wrap{position:absolute;top:14px;display:flex;gap:5px;align-items:center}
#mp-a{left:250px}
#mp-b{right:250px;flex-direction:row-reverse}
.mp-gem{width:10px;height:10px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#7dd3fc,#0284c7);box-shadow:0 0 6px rgba(79,195,247,.6);transition:all .3s}
.mp-gem.lost{background:rgba(255,255,255,.1);box-shadow:none}

/* ── 精灵槽 ── */
.poke-slot{
  position:absolute;bottom:calc(30% - 5px);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:transform .18s ease;z-index:2
}
#slot-a{left:18%;transform:translateX(-50%)}
#slot-b{right:18%;transform:translateX(50%)}

/* 精灵立绘图 */
.sprite-img{
  width:120px;height:120px;
  object-fit:contain;
  filter:drop-shadow(2px 4px 6px rgba(0,0,0,.4));
  transition:opacity .35s,filter .35s;
  image-rendering:-webkit-optimize-contrast
}
#sprite-a .sprite-img{transform:scaleX(-1)}

/* 精灵脚下发光圈 */
.sprite-glow{
  position:absolute;bottom:-8px;width:100px;height:24px;border-radius:50%;
  pointer-events:none;
  border:2px solid transparent
}
#slot-a .sprite-glow{
  border-color:rgba(33,150,243,.7);
  background:radial-gradient(ellipse,rgba(33,150,243,.2) 0%,transparent 70%);
  box-shadow:0 0 12px rgba(33,150,243,.5),0 0 24px rgba(33,150,243,.2)
}
#slot-b .sprite-glow{
  border-color:rgba(244,67,54,.7);
  background:radial-gradient(ellipse,rgba(244,67,54,.2) 0%,transparent 70%);
  box-shadow:0 0 12px rgba(244,67,54,.5),0 0 24px rgba(244,67,54,.2)
}

/* Emoji 降级精灵（无图时） */
.sprite-emoji{
  width:120px;height:120px;
  display:flex;align-items:center;justify-content:center;
  font-size:64px;
  filter:drop-shadow(0 6px 16px rgba(0,0,0,.7));
}
#sprite-a .sprite-emoji{transform:scaleX(-1)}

.sprite-label{
  font-size:10px;font-weight:700;color:#333;
  text-shadow:0 1px 2px rgba(255,255,255,.8);
  background:rgba(255,255,255,.6);padding:1px 8px;border-radius:8px
}

/* 防御盾牌 */
.shield-overlay{
  position:absolute;width:64px;height:84px;border-radius:50% 50% 40% 40%;
  border:2px solid;opacity:0;pointer-events:none;z-index:5;transition:opacity .2s
}
#shield-a{left:calc(18% - 32px + 60px);bottom:calc(34%);border-color:rgba(79,195,247,.9);background:rgba(79,195,247,.1);box-shadow:0 0 20px rgba(79,195,247,.5);transform:translateX(-50%)}
#shield-b{right:calc(18% - 32px + 60px);bottom:calc(34%);border-color:rgba(248,113,113,.9);background:rgba(248,113,113,.1);box-shadow:0 0 20px rgba(248,113,113,.5);transform:translateX(50%)}
.shield-overlay.show{opacity:1}
.shield-overlay::before{content:'🛡';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:24px;filter:drop-shadow(0 0 4px currentColor)}

/* 类型色 */
.t-normal{background:#6b7280;color:#fff}
.t-fire{background:#dc2626}
.t-water{background:#2563eb}
.t-electric{background:#ca8a04;color:#fff}
.t-grass{background:#16a34a}
.t-ice{background:#0891b2}
.t-fighting{background:#b45309}
.t-poison{background:#7c3aed}
.t-ground{background:#92400e}
.t-flying{background:#6d28d9}
.t-psychic{background:#be185d}
.t-bug{background:#4d7c0f}
.t-rock{background:#57534e}
.t-ghost{background:#4338ca}
.t-dragon{background:#1d4ed8}
.t-dark{background:#1f2937}
.t-steel{background:#475569}
.t-fairy{background:#be185d}
.t-light{background:#854d0e}

/* ═══ 队伍预览 ═══ */
#team-overview{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 14px;
  background:linear-gradient(180deg,#0d1628,#111e38);
  border-bottom:1px solid var(--border);
  flex-shrink:0
}
.team-strip{display:flex;gap:5px;align-items:center}
.strip-label{font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-right:4px}
.mini-poke{
  width:38px;height:38px;border-radius:8px;
  background:var(--bg-card);border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  position:relative;transition:border-color .2s,box-shadow .2s;cursor:default;
  overflow:hidden
}
.mini-poke.active{border-color:var(--accent);box-shadow:0 0 8px var(--accentg)}
.mini-poke.fainted{opacity:.2;filter:grayscale(1)}
.mini-poke img{width:32px;height:32px;object-fit:contain}
.mini-poke .mini-emoji{font-size:18px}
.mini-hp-wrap{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(0,0,0,.5)}
.mini-hp-fill{height:100%;transition:width .4s}

/* ═══ 操作面板 ═══ */
#action-panel{flex:1;padding:10px 14px;display:flex;flex-direction:column;gap:8px;overflow:hidden;position:relative}
#action-title{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:6px}
#action-title::before{content:'';width:3px;height:12px;background:var(--accent);border-radius:2px}
#skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.skill-btn{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rs);
  padding:9px 11px;cursor:pointer;text-align:left;color:var(--text);
  transition:background .15s,border-color .15s,transform .1s,box-shadow .15s
}
.skill-btn:hover:not(:disabled){
  background:var(--bg-card-h);border-color:rgba(79,195,247,.5);
  transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.4)
}
.skill-btn:active:not(:disabled){transform:translateY(0)}
.skill-btn:disabled{opacity:.35;cursor:not-allowed}
.skill-btn .sname{font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.skill-btn .scost{font-size:11px;font-weight:800;color:var(--accent);background:rgba(79,195,247,.12);padding:1px 5px;border-radius:4px}
.skill-btn .smeta{font-size:9px;color:var(--dim);display:flex;gap:3px;flex-wrap:wrap;align-items:center}
.skill-btn .spower{font-weight:700;color:var(--orange)}
.tag-pill{background:rgba(79,195,247,.1);border:1px solid rgba(79,195,247,.2);border-radius:3px;padding:0 3px;font-size:8px;color:var(--accent)}
.tag-counter{background:rgba(192,132,252,.1);border:1px solid rgba(192,132,252,.2);color:var(--purple)}
.skill-btn.cd-btn{border-color:rgba(251,191,36,.4)}
.skill-btn.cd-btn .sname{color:var(--yellow)}

/* 工具行 */
#util-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.util-btn{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rs);
  padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;
  color:var(--text);font-size:12px;font-weight:600;
  transition:background .15s,border-color .15s,transform .1s
}
.util-btn:hover:not(:disabled){background:var(--bg-card-h);border-color:rgba(79,195,247,.5);transform:translateY(-1px)}
.util-btn:disabled{opacity:.35;cursor:not-allowed}
.util-btn .icon{font-size:15px}

/* 换人面板 */
#switch-panel{display:none;flex-direction:column;gap:5px;overflow-y:auto;max-height:150px}
#switch-panel.open{display:flex}
.sw-card{
  display:flex;align-items:center;gap:8px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rs);
  padding:7px 10px;cursor:pointer;
  transition:background .15s,border-color .15s;color:var(--text);font-size:11px
}
.sw-card:hover:not(:disabled){background:var(--bg-card-h);border-color:rgba(74,222,128,.4)}
.sw-card:disabled{opacity:.3;cursor:not-allowed}
.sw-icon-wrap{width:32px;height:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sw-icon-wrap img{width:32px;height:32px;object-fit:contain}
.sw-icon{font-size:22px}
.sw-info{flex:1;min-width:0}
.sw-name{font-weight:700;font-size:12px}
.sw-hp{font-size:9px;color:var(--dim)}
.adv-badge{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;white-space:nowrap;flex-shrink:0}
.adv-super{background:rgba(74,222,128,.2);border:1px solid rgba(74,222,128,.4);color:var(--green)}
.adv-weak{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);color:var(--red)}
.adv-norm{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--dim)}
#switch-back{font-size:10px;color:var(--dim);cursor:pointer;text-decoration:none;background:none;border:none;padding:3px 0;opacity:.7}
#switch-back:hover{opacity:1}

/* 等待遮罩 */
#wait-mask{display:none;position:absolute;inset:0;background:rgba(10,14,26,.7);border-radius:var(--r);align-items:center;justify-content:center;flex-direction:column;gap:8px;z-index:10;backdrop-filter:blur(3px)}
#wait-mask.show{display:flex}
#wait-mask .wtext{font-size:13px;font-weight:600;color:var(--dim)}
.spinner{width:28px;height:28px;border:3px solid rgba(79,195,247,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 起始 & 结束 */
#start-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;background:var(--bg-field);border-radius:var(--r);border:1px solid var(--border)}
#start-screen h2{font-size:18px;color:var(--accent);font-weight:800}
#start-screen p{font-size:12px;color:var(--dim);text-align:center;line-height:1.7}
.start-btn{background:linear-gradient(135deg,#0284c7,#0ea5e9);color:#fff;border:none;border-radius:var(--rs);padding:10px 28px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;box-shadow:0 4px 16px rgba(14,165,233,.4)}
.start-btn:hover{opacity:.88;transform:translateY(-1px)}
#gameover-banner{display:none;background:rgba(10,14,26,.95);border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:center;flex-direction:column;gap:12px;flex-shrink:0;backdrop-filter:blur(8px)}
#gameover-banner.show{display:flex}
#gameover-title{font-size:20px;font-weight:900}
.again-btn{background:linear-gradient(135deg,#0284c7,#0ea5e9);color:#fff;border:none;border-radius:var(--rs);padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(14,165,233,.35)}
.again-btn:hover{opacity:.85}

/* ═══ 右侧播报 ═══ */
#side-panel{background:var(--bg-panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#log-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:rgba(79,195,247,.04)}
#log-clear{background:none;border:none;color:var(--muted);cursor:pointer;font-size:10px;transition:color .15s}
#log-clear:hover{color:var(--dim)}
#battle-log{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:1px;font-size:11px;line-height:1.6;color:var(--text)}
#battle-log::-webkit-scrollbar{width:3px}
#battle-log::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.log-line{padding:1px 0}
.log-sep{border-top:1px solid var(--border);margin:5px 0;color:var(--muted);font-weight:600;font-size:10px;padding-top:4px}
.log-win{color:var(--green);font-weight:700}
.log-lose{color:var(--red);font-weight:700}
.log-dmg{color:#fca5a5}
.log-heal{color:var(--green)}
.log-status{color:var(--purple)}
.log-mp{color:var(--yellow)}
.log-cute{color:var(--pink)}

/* ═══ 动画 ═══ */
@keyframes atk-a{0%{transform:translateX(-50%) translateX(0)}40%{transform:translateX(-50%) translateX(42px)}70%{transform:translateX(-50%) translateX(-4px)}100%{transform:translateX(-50%) translateX(0)}}
@keyframes atk-b{0%{transform:translateX(50%) translateX(0)}40%{transform:translateX(50%) translateX(-42px)}70%{transform:translateX(50%) translateX(4px)}100%{transform:translateX(50%) translateX(0)}}
@keyframes hit-flash{0%,100%{filter:drop-shadow(0 6px 20px rgba(0,0,0,.8))}35%{filter:drop-shadow(0 0 22px rgba(248,113,113,1)) brightness(2.5)}65%{filter:drop-shadow(0 6px 20px rgba(0,0,0,.8)) brightness(1.5)}}
@keyframes shield-pulse{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.1)}}
@keyframes shield-b-pulse{0%,100%{transform:translateX(50%) scale(1)}50%{transform:translateX(50%) scale(1.1)}}
@keyframes faint-drop{to{opacity:0;transform:translateY(24px) scale(.75)}}
@keyframes float-up{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-36px)}}
@keyframes slide-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes entry-bounce{0%{transform:translateY(20px) scale(.85);opacity:0}60%{transform:translateY(-5px) scale(1.04)}100%{transform:translateY(0) scale(1);opacity:1}}
.slot-atk-a{animation:atk-a .44s ease}
.slot-atk-b{animation:atk-b .44s ease}
.sprite-hit{animation:hit-flash .5s ease}
.sprite-faint{animation:faint-drop .6s ease forwards}
.shield-pulse-a{animation:shield-pulse .5s ease}
.shield-pulse-b{animation:shield-b-pulse .5s ease}
.float-dmg{position:absolute;font-size:20px;font-weight:900;pointer-events:none;animation:float-up .9s ease forwards;
  text-shadow:0 0 4px #fff,0 0 4px #fff,1px 1px 0 #fff,-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff;
  z-index:20}
.sprite-entry{animation:entry-bounce .55s cubic-bezier(.34,1.56,.64,1) forwards}
</style>
</head>
<body>

<!-- 顶栏 -->
<div id="top-bar">
  <h1>🐾 洛克王国 · 战斗模拟器</h1>
  <span id="turn-info">—</span>
  <span id="conn-status" class="disconnected">● 未连接</span>
</div>

<!-- 主体 -->
<div id="main">
  <div id="battlefield">

    <!-- 战场画布 -->
    <div id="arena">

        </div>
        <div class="hp-track"><div class="hp-fill" id="hp-fill-b" style="width:100%"></div></div>
        <div class="hp-text"><span>AI方</span><span id="hp-text-b">—</span></div>

      <!-- 盾牌特效 -->

      <div class="shield-overlay" id="shield-b"></div>

      <!-- 精灵 A -->
      <div class="poke-slot" id="slot-a">
        <div id="sprite-a"></div>
        <div class="sprite-glow"></div>
        <span class="sprite-label" id="label-a">—</span>
      </div>

      <!-- 精灵 B -->
      <div class="poke-slot" id="slot-b">
        <div id="sprite-b"></div>
        <div class="sprite-glow"></div>

    <!-- 队伍预览 -->

      <div class="team-strip">
        <span class="strip-label">AI方</span>
        <div id="strip-b" class="team-strip" style="gap:5px"></div>
      </div>
    </div>

    <!-- 操作区 -->
    <div id="action-panel">
      <!-- 起始界面 -->
      <div id="start-screen">
        <h2>⚔️ 洛克王国战斗模拟器</h2>
        <p id="start-desc">你将控制<b>毒队</b>对抗 AI 控制的<b>翼王队</b><br>选择技能、聚能或换人，击败对手！</p>
        <button class="start-btn" onclick="startBattle()">开始战斗</button>
        <a href="/team" style="font-size:11px;color:var(--dim);text-decoration:none;opacity:.7">← 返回阵容搭配</a>
      </div>

      <!-- 战斗 UI -->
      <div id="battle-ui" style="display:none;flex-direction:column;gap:8px;height:100%">
        <div id="action-title">选择行动</div>
        <div id="skill-grid"></div>

          <button class="util-btn" id="btn-charge" onclick="doCharge()">
            <span class="icon">⚡</span>汇合聚能
            <span style="font-size:9px;color:var(--dim);margin-left:auto">+5能量</span>

          <button class="util-btn" id="btn-switch-toggle" onclick="toggleSwitch()">
            <span class="icon">🔄</span>换人
          </button>

  <!-- 右侧日志 -->
  <div id="side-panel">
    <div id="log-header">
      战斗播报
      <button id="log-clear" onclick="clearLog()">清空</button>
    </div>
    <div id="battle-log"></div>
  </div>
</div>

<script>
// ══════════════════════════════
// 常量 & 配置
// ══════════════════════════════
const SPRITE_EMOJIS = {
  '千棘盔':'🦔','影狸':'🦊','裘卡':'🐺',
  '琉璃水母':'🪼','迷迷箱怪':'🎁','海豹船长':'🦭',
  '燃薪虫':'🐛','圣羽翼王':'🦅','翠顶夫人':'🦚',
  '秩序鱿墨':'🦑','声波缇塔':'🤖',
};
const TYPE_CLASS = {
  normal:'t-normal',fire:'t-fire',water:'t-water',electric:'t-electric',
  grass:'t-grass',ice:'t-ice',fighting:'t-fighting',poison:'t-poison',
  ground:'t-ground',flying:'t-flying',psychic:'t-psychic',bug:'t-bug',
  rock:'t-rock',ghost:'t-ghost',dragon:'t-dragon',dark:'t-dark',
  steel:'t-steel',fairy:'t-fairy',light:'t-light',
};
const TYPE_ZH = {
  normal:'普通',fire:'火',water:'水',electric:'电',grass:'草',ice:'冰',
  fighting:'武',poison:'毒',ground:'地',flying:'翼',psychic:'幻',
  bug:'虫',rock:'岩',ghost:'幽',dragon:'龙',dark:'恶',steel:'机械',fairy:'萌',light:'光',
};
const CAT_ZH = {'物攻':'物','魔攻':'魔','防御':'防','状态':'变','物理':'物','魔法':'魔','变化':'变'};

function emoji(name){ return SPRITE_EMOJIS[name] || '🐾'; }

function makeSpriteEl(p, side) {
  // 优先图片，无图时 emoji 降级
  if(p.icon_url) {
    const img = document.createElement('img');
    img.className = 'sprite-img';
    img.src = p.icon_url;
    img.alt = p.name;
    img.onerror = () => {
      // 加载失败时用 emoji
      const wrap = document.createElement('div');
      wrap.className = 'sprite-emoji';
      wrap.textContent = emoji(p.name);
      img.replaceWith(wrap);
    };
    return img;
  } else {
    const wrap = document.createElement('div');
    wrap.className = 'sprite-emoji';
    wrap.textContent = emoji(p.name);
    return wrap;
  }
}

// ══════════════════════════════
// 状态
// ══════════════════════════════
let ws = null;
let state = null;
let myTurn = false;
let showSwitch = false;
let logCount = 0;

// ══════════════════════════════
// WebSocket
// ══════════════════════════════
function connect(){
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen  = ()=>{ setConn(true);  send({cmd:'get_state'}); };
  ws.onclose = ()=>{ setConn(false); setTimeout(connect,2000); };
  ws.onerror = ()=> ws.close();
  ws.onmessage = e => onMsg(JSON.parse(e.data));
}
function send(o){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(o)); }
function setConn(ok){
  const el=document.getElementById('conn-status');
  el.textContent = ok?'● 已连接':'● 断开';
  el.className = ok?'connected':'disconnected';
}

// ══════════════════════════════
// 消息处理
// ══════════════════════════════
function onMsg(msg){
  switch(msg.type){
    case 'state':
      state = msg;
      renderState(msg);
      if(msg.logs) appendLogs(msg.logs);
      if(msg.events && msg.events.length) playEvents(msg.events);
      if(msg.game_over) showGameOver(msg.winner);
      if(msg.force_switch_prompt && !msg.game_over){
        console.log('[DEBUG] Force switch prompt received');
      }
      break;
    case 'your_turn':
      myTurn=true;
      setWait(false);
      enableActions(true);
      document.getElementById('turn-info').textContent=`回合 ${msg.turn} — 你的回合`;
      break;
    case 'ai_thinking':
      myTurn=false;
      enableActions(false);
      setWait(true,'AI思考中…');
      break;
    case 'reset_ok': location.reload(); break;
    case 'error':
      addLogLine('⚠️ '+msg.message,'');
      console.log('[DEBUG] Error received');
      break;
  }
}

// ══════════════════════════════
// 渲染战斗状态
// ══════════════════════════════
function renderState(s){
  const pa=s.team_a[s.current_a], pb=s.team_b[s.current_b];
  updateHpBar('a',pa); updateHpBar('b',pb);
  renderMp('mp-a',s.mp_a,4); renderMp('mp-b',s.mp_b,4);
  updateSprite('a',pa); updateSprite('b',pb);
  document.getElementById('turn-info').textContent=`回合 ${s.turn}`;
  renderStrip('strip-a',s.team_a,s.current_a);
  renderStrip('strip-b',s.team_b,s.current_b);

  if(s.force_switch_prompt && !s.game_over){
    myTurn=true;
    setWait(false);
    enableActions(false);
    renderSkills(null, null);
    renderForceSwitchPanel(s.team_a, s.current_a, pb);
  } else if(s.waiting_for_player && !s.game_over){
    myTurn=true;
    setWait(false);
    renderSkills(pa, pb);
    renderSwitchPanel(s.team_a, s.current_a, pb);
  } else if(s.game_over){
    myTurn=false;
    setWait(false);
  }
}

function updateHpBar(side,p){
  const fill   = document.getElementById(`hp-fill-${side}`);
  const txt    = document.getElementById(`hp-text-${side}`);
  const name   = document.getElementById(`name-${side}`);
  const tb     = document.getElementById(`type-${side}`);
  const ec     = document.getElementById(`energy-${side}`);
  const pct    = p.hp>0 ? p.current_hp/p.hp*100 : 0;

  fill.style.width = pct+'%';
  fill.className = 'hp-fill' + (pct<=20?' hp-red':pct<=50?' hp-yellow':'');
  txt.textContent = `${p.current_hp}/${p.hp}`;
  name.textContent = p.name;
  tb.className = `type-badge ${TYPE_CLASS[p.type]||''}`;
  tb.textContent = TYPE_ZH[p.type]||p.type;

  // 能量圆点
  ec.innerHTML = '';
  for(let i=0;i<10;i++){
    const d = document.createElement('div');
    d.className = 'e-dot' + (i<p.energy?' on':'');
    ec.appendChild(d);
  }

  renderBuffRow(side, p);
}

function renderBuffRow(side, p){
  const el = document.getElementById(`buff-${side}`);
  if(!el) return;
  el.innerHTML = '';
  const tag = (text, cls) => {
    const s = document.createElement('span');
    s.className = `buff-tag ${cls}`;
    s.textContent = text;
    el.appendChild(s);
  };

  const stats = [
    ['物攻', p.atk_up, p.atk_down],
    ['物防', p.def_up, p.def_down],
    ['魔攻', p.spatk_up, p.spatk_down],
    ['魔防', p.spdef_up, p.spdef_down],
    ['速度', p.speed_up, p.speed_down],
  ];
  stats.forEach(([label, up, down]) => {
    if(up && up > 0) tag(`${label}+${up}%`, 'buff-up');
    if(down && down > 0) tag(`${label}-${down}%`, 'buff-down');
  });

  if(p.poison_stacks > 0)    tag(`中毒×${p.poison_stacks}`, 'buff-status');
  if(p.burn_stacks > 0)      tag(`灼烧×${p.burn_stacks}`, 'buff-status');
  if(p.frostbite_damage > 0) tag(`冻伤`, 'buff-status');
  if(p.leech_stacks > 0)     tag(`寄生×${p.leech_stacks}`, 'buff-status');
  if(p.meteor_stacks > 0)    tag(`星陨×${p.meteor_stacks}(${p.meteor_countdown})`, 'buff-status');
  if(p.cute_stacks > 0)      tag(`萌化×${p.cute_stacks}`, 'buff-cute');

  if(p.ability_info && p.ability_info.length > 0){
    p.ability_info.forEach(info => tag(info, 'buff-ability'));
  }
}

function renderMp(id,cur,max){
  const el=document.getElementById(id);
  el.innerHTML='';
  for(let i=0;i<max;i++){
    const d=document.createElement('div');
    d.className='mp-gem'+(i>=cur?' lost':'');
    el.appendChild(d);
  }
}

function updateSprite(side,p){
  const container = document.getElementById(`sprite-${side}`);
  const lbl       = document.getElementById(`label-${side}`);

  // 清空并重建精灵图元素
  container.innerHTML = '';
  const el = makeSpriteEl(p, side);
  container.appendChild(el);

  // 倒地透明
  el.style.opacity = p.is_fainted ? '0.12' : '1';
  // hover 显示特性
  container.title = p.ability || '';
  lbl.textContent = p.name;
}

function renderStrip(id,team,cur){
  const el=document.getElementById(id);
  el.innerHTML='';
  team.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='mini-poke'+(i===cur?' active':'')+(p.is_fainted?' fainted':'');
    d.title=p.name + (p.ability ? '\n特性: '+p.ability : '');
    const pct=p.hp>0?p.current_hp/p.hp*100:0;
    const col=pct>50?'var(--hp-g)':pct>20?'var(--hp-y)':'var(--hp-r)';

    if(p.icon_url){
      const img=document.createElement('img');
      img.src=p.icon_url; img.alt=p.name;
      img.onerror=()=>{ img.replaceWith(Object.assign(document.createElement('span'),{className:'mini-emoji',textContent:emoji(p.name)})); };
      d.appendChild(img);
    } else {
      const sp=document.createElement('span');
      sp.className='mini-emoji'; sp.textContent=emoji(p.name);
      d.appendChild(sp);
    }
    d.insertAdjacentHTML('beforeend',`<div class="mini-hp-wrap"><div class="mini-hp-fill" style="width:${pct}%;background:${col}"></div></div>`);
    el.appendChild(d);
  });
}

// ══════════════════════════════
// 技能按钮
// ══════════════════════════════
function renderSkills(pa, pb){
  const grid=document.getElementById('skill-grid');
  grid.innerHTML='';
  if(!pa || !pa.skills) return;
  pa.skills.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className='skill-btn'+(s.on_cooldown?' cd-btn':'');
    btn.disabled=!s.can_use;

    const tc=TYPE_CLASS[s.type]||'';
    const normalTags = s.tags.filter(t=>!t.startsWith('['));
    const counterTags = s.tags.filter(t=>t.startsWith('['));
    const tagHtml = normalTags.map(t=>`<span class="tag-pill">${t}</span>`).join('')
                  + counterTags.map(t=>`<span class="tag-pill tag-counter">${t}</span>`).join('');
    const cdNote = s.on_cooldown?`<span style="color:var(--yellow);font-size:9px">冷却${s.cooldown}回合</span>`:'';

    btn.innerHTML=`
      <div class="sname">
        <span>${s.name}</span>
        <span class="scost">⚡${s.energy_cost}</span>
      </div>
      <div class="smeta">
        <span class="type-badge ${tc}" style="font-size:8px;padding:0 4px">${TYPE_ZH[s.type]||s.type}</span>
        <span>${CAT_ZH[s.category]||s.category}</span>
        ${s.power>0?`<span class="spower">威${s.power}</span>`:''}
        ${cdNote}${tagHtml}
      </div>`;
    btn.onclick=()=>doSkill(i);
    grid.appendChild(btn);
  });
}

// ══════════════════════════════
// 换人面板（含图片）
// ══════════════════════════════
function _swCardHtml(p, i, isForce){
  const tc=TYPE_CLASS[p.type]||'';
  const pct=p.hp>0?(p.current_hp/p.hp*100).toFixed(0):0;
  const adv = p.type_advantage || 1.0;
  let advHtml='';
  if(adv>=2.0)      advHtml=`<span class="adv-badge adv-super">克制×${adv}</span>`;
  else if(adv<=0.5) advHtml=`<span class="adv-badge adv-weak">被克×${adv}</span>`;
  else              advHtml=`<span class="adv-badge adv-norm">普通</span>`;

  const iconHtml = p.icon_url
    ? `<div class="sw-icon-wrap"><img src="${p.icon_url}" alt="${p.name}" onerror="this.parentNode.innerHTML='<span class=\\'sw-icon\\'>${emoji(p.name)}</span>'"></div>`
    : `<div class="sw-icon-wrap"><span class="sw-icon">${emoji(p.name)}</span></div>`;

  return `
    ${iconHtml}
    <div class="sw-info">
      <div class="sw-name">${p.name}</div>
      <div class="sw-hp">HP ${p.current_hp}/${p.hp}(${pct}%) ⚡${p.energy}</div>
    </div>
    <span class="type-badge ${tc}" style="font-size:8px">${TYPE_ZH[p.type]||p.type}</span>
    ${advHtml}`;
}

function renderSwitchPanel(teamA, curIdx, enemyPoke){
  const panel=document.getElementById('switch-panel');
  panel.innerHTML='';
  const available = teamA.filter((_,i)=>i!==curIdx && !teamA[i].is_fainted);
  document.getElementById('btn-switch-toggle').disabled = available.length===0;
  if(available.length===0) return;

  teamA.forEach((p,i)=>{
    if(i===curIdx||p.is_fainted) return;
    const card=document.createElement('button');
    card.className='sw-card';
    card.innerHTML=_swCardHtml(p, i, false);
    card.onclick=()=>doSwitch(i);
    panel.appendChild(card);
  });

  const back=document.createElement('button');
  back.id='switch-back';
  back.textContent='← 返回技能';
  back.onclick=()=>{ showSwitch=false; panel.classList.remove('open'); };
  panel.appendChild(back);
}

function renderForceSwitchPanel(teamA, curIdx, enemyPoke){
  document.getElementById('switch-panel').classList.add('open');
  const panel=document.getElementById('switch-panel');
  panel.innerHTML='';

  const title=document.createElement('div');
  title.style.cssText='color:var(--yellow);font-weight:700;padding:6px 4px;font-size:12px';
  title.textContent='🔄 应对成功！选择换上的精灵（不占回合）';
  panel.appendChild(title);

  teamA.forEach((p,i)=>{
    if(i===curIdx || p.is_fainted) return;
    const card=document.createElement('button');
    card.className='sw-card';
    card.innerHTML=_swCardHtml(p, i, true);
    card.onclick=()=>doForceSwitch(i);
    panel.appendChild(card);
  });
}

function doForceSwitch(idx){
  if(!myTurn) return;
  myTurn=false;
  enableActions(false);
  setWait(true,'换人中…');
  send({type:'switch', index:idx});
}

// ══════════════════════════════
// 玩家操作
// ══════════════════════════════
function doSkill(idx){
  if(!myTurn) return;
  myTurn=false;
  showSwitch=false;
  document.getElementById('switch-panel').classList.remove('open');
  enableActions(false);
  setWait(true,'执行中…');
  send({cmd:'action',action:{type:'skill',index:idx}});
}
function doCharge(){
  if(!myTurn) return;
  myTurn=false;
  enableActions(false);
  setWait(true,'执行中…');
  send({cmd:'action',action:{type:'charge'}});
}
function doSwitch(idx){
  if(!myTurn) return;
  myTurn=false;
  showSwitch=false;
  document.getElementById('switch-panel').classList.remove('open');
  enableActions(false);
  setWait(true,'执行中…');
  send({cmd:'action',action:{type:'switch',index:idx}});
}
function toggleSwitch(){
  showSwitch=!showSwitch;
  document.getElementById('switch-panel').classList.toggle('open',showSwitch);
}
function startBattle(){
  document.getElementById('start-screen').style.display='none';
  document.getElementById('gameover-banner').classList.remove('show');
  document.getElementById('battle-ui').style.display='flex';
  setWait(true,'战斗初始化中…');
  logCount=0;
  clearLog();

  const playerTeamRaw = sessionStorage.getItem('playerTeam');
  const aiTeam = sessionStorage.getItem('aiTeam') || 'wing';

  if (playerTeamRaw) {
    const playerTeam = JSON.parse(playerTeamRaw);
    send({ cmd: 'start_custom', player_team: playerTeam, ai_team: aiTeam });
  } else {
    send({ cmd: 'start' });
  }
}

// ══════════════════════════════
// 动画事件
// ══════════════════════════════
function playEvents(events){
  let delay = 0;
  events.forEach(ev=>{
    setTimeout(()=>{
      if(ev.type==='hit')    playHit(ev.side, ev.dmg, ev.eff);
      if(ev.type==='shield') playShield(ev.side);
      if(ev.type==='faint')  playFaint(ev.side);
    }, delay);
    delay += 200;
  });
}

function playHit(side, dmg, eff){
  const atkSide = side==='a'?'b':'a';
  const atkSlot = document.getElementById(`slot-${atkSide}`);
  const spriteEl = document.getElementById(`sprite-${side}`).querySelector('img,.sprite-emoji');

  atkSlot.classList.add(`slot-atk-${atkSide}`);
  setTimeout(()=>atkSlot.classList.remove('slot-atk-a','slot-atk-b'),450);

  if(spriteEl){ spriteEl.classList.add('sprite-hit'); setTimeout(()=>spriteEl.classList.remove('sprite-hit'),510); }

  if(dmg>0){
    const arena=document.getElementById('arena');
    const slot =document.getElementById(`slot-${side}`);
    const fl   =document.createElement('div');
    fl.className='float-dmg';
    let label = `-${dmg}`;
    if(eff==='super') label += ' 克制！';
    else if(eff==='resist') label += ' 抵抗';
    fl.textContent = label;
    fl.style.color = eff==='super' ? '#c62828' : eff==='resist' ? '#888' : '#e53935';
    if(eff==='super') fl.style.fontSize = '24px';
    const sr=slot.getBoundingClientRect(), ar=arena.getBoundingClientRect();
    fl.style.left=(sr.left-ar.left+sr.width/2-18)+'px';
    fl.style.top =(sr.top -ar.top+5)+'px';
    arena.appendChild(fl);
    setTimeout(()=>fl.remove(),950);
  }
}

function playShield(side){
  const shield=document.getElementById(`shield-${side}`);
  shield.classList.add('show');
  shield.classList.add(`shield-pulse-${side}`);
  setTimeout(()=>{
    shield.classList.remove('show');
    shield.classList.remove(`shield-pulse-${side}`);
  },1200);
}

function playFaint(side){
  const spriteEl = document.getElementById(`sprite-${side}`).querySelector('img,.sprite-emoji');
  if(spriteEl){ spriteEl.classList.add('sprite-faint'); setTimeout(()=>spriteEl.classList.remove('sprite-faint'),620); }
}

// ══════════════════════════════
// UI 辅助
// ══════════════════════════════
function enableActions(on){
  ['btn-charge','btn-switch-toggle'].forEach(id=>{
    const b=document.getElementById(id);
    if(b) b.disabled=!on;
  });
  document.querySelectorAll('.skill-btn').forEach(b=>{if(!on) b.disabled=true;});
  document.querySelectorAll('.sw-card').forEach(b=>{if(!on) b.disabled=true;});
}
function setWait(show,text=''){
  document.getElementById('wait-mask').classList.toggle('show',show);
  if(text) document.getElementById('wait-text').textContent=text;
}
function showGameOver(winner){
  const banner=document.getElementById('gameover-banner');
  const title =document.getElementById('gameover-title');
  banner.classList.add('show');
  setWait(false);
  title.textContent = winner==='a'?'🏆 你赢了！':'💔 AI赢了！';
  title.style.color  = winner==='a'?'var(--green)':'var(--red)';
}

// ══════════════════════════════
// 战报日志（增量追加）
// ══════════════════════════════
function appendLogs(lines){
  if(!lines||lines.length===0) return;
  const newLines = lines.slice(logCount);
  newLines.forEach(l=>addLogLine(l));
  logCount = lines.length;
}

function addLogLine(text){
  const log=document.getElementById('battle-log');
  const el =document.createElement('div');

  if(!text){
    el.className='log-sep'; el.textContent='';
  } else if(text.startsWith('═')||text.startsWith('─')){
    el.className='log-sep'; el.textContent=text;
  } else if(text.includes('你赢了')||text.includes('胜利')){
    el.className='log-line log-win'; el.textContent=text;
  } else if(text.includes('AI赢了')){
    el.className='log-line log-lose'; el.textContent=text;
  } else if(text.includes('受到')&&text.includes('伤害')){
    el.className='log-line log-dmg'; el.textContent=text;
  } else if(text.includes('回复')||text.includes('💚')){
    el.className='log-line log-heal'; el.textContent=text;
  } else if(text.includes('中毒')||text.includes('燃烧')||text.includes('寄生')||text.includes('星陨')||text.includes('冻伤')){
    el.className='log-line log-status'; el.textContent=text;
  } else if(text.includes('萌化')){
    el.className='log-line log-cute'; el.textContent=text;
  } else if(text.includes('MP')||text.includes('💔')){
    el.className='log-line log-mp'; el.textContent=text;
  } else {
    el.className='log-line'; el.textContent=text;
  }

  log.appendChild(el);
  log.scrollTop=log.scrollHeight;
}

function clearLog(){
  document.getElementById('battle-log').innerHTML='';
  logCount=0;
}

// ══════════════════════════════
// 启动
// ══════════════════════════════
(function checkTeam(){
  const raw = sessionStorage.getItem('playerTeam');
  const ai  = sessionStorage.getItem('aiTeam') || 'wing';
  const desc = document.getElementById('start-desc');
  if (raw) {
    const team = JSON.parse(raw);
    const aiName = ai === 'toxic' ? '毒队' : '翼王队';
    desc.innerHTML = `你的自定义阵容：<b>${team.map(t=>t.name).join('、')}</b><br>对手AI：<b>${aiName}</b>`;
  }
})();
connect();
</script>
